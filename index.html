<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Snakio Chat</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#060912;
  color:white;
  overflow:hidden;
}

/* grid background */
body::before{
  content:"";
  position:absolute;
  inset:0;
  background:
    linear-gradient(rgba(122,162,255,.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(122,162,255,.05) 1px, transparent 1px);
  background-size:60px 60px;
}

/* LOGIN */
#login{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
}

.box{
  width:320px;
  padding:20px;
  border-radius:16px;
  background:rgba(10,15,25,.9);
  border:1px solid rgba(122,162,255,.2);
}

input{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:none;
  background:#111a2a;
  color:white;
}

button{
  width:100%;
  margin-top:10px;
  padding:12px;
  border-radius:10px;
  border:none;
  background:#7aa2ff;
  font-weight:700;
  cursor:pointer;
}

/* CHAT */
#chat{
  display:none;
  height:100vh;
  flex-direction:column;
}

#messages{
  flex:1;
  overflow:auto;
  padding:20px;
}

.msg{
  margin:10px 0;
  padding:10px;
  border-radius:10px;
  background:rgba(255,255,255,.05);
}

.name{
  font-weight:800;
  color:#7aa2ff;
  cursor:pointer;
}

.time{
  font-size:12px;
  opacity:.5;
}

/* bottom bar */
#bar{
  display:flex;
  padding:10px;
  background:rgba(0,0,0,.4);
}

#text{
  flex:1;
  padding:12px;
  border-radius:10px;
  border:none;
  background:#111a2a;
  color:white;
}

#plus{
  width:40px;
  height:40px;
  margin-left:8px;
  border-radius:50%;
  background:#7aa2ff;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  font-size:20px;
  font-weight:900;
}

#send{
  margin-left:8px;
  padding:0 16px;
  border-radius:10px;
  border:none;
  background:#5dffb2;
  font-weight:800;
}

/* DM popup */
#dm{
  position:absolute;
  right:10px;
  bottom:80px;
  width:260px;
  background:rgba(10,15,25,.95);
  border:1px solid rgba(122,162,255,.2);
  border-radius:12px;
  display:none;
  padding:10px;
}

.toast{
  position:absolute;
  left:10px;
  top:10px;
  padding:10px;
  background:#7aa2ff;
  border-radius:10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div class="box">
    <h2>Snakio Chat</h2>
    <input id="name" placeholder="username">
    <button onclick="join()">Sign up</button>
  </div>
</div>

<!-- CHAT -->
<div id="chat">
  <div id="messages"></div>

  <div id="bar">
    <div id="plus">+</div>
    <input id="text" placeholder="message...">
    <button id="send">Send</button>
  </div>
</div>

<!-- DM BOX -->
<div id="dm"></div>

<script>
const ws = new WebSocket("https://snakio-chat.onrender.com");

let myName = "";
let dmTo = null;

ws.onmessage = (e)=>{
  const d = JSON.parse(e.data);

  if(d.type==="msg"){
    addMsg(d.from,d.time,d.text);
  }

  if(d.type==="system"){
    addSys(d.msg);
  }

  if(d.type==="dm"){
    showToast("DM from "+d.from);
    openDM(d.from,d.text);
  }
};

function join(){
  myName = document.getElementById("name").value;
  ws.send(JSON.stringify({type:"join",name:myName}));

  document.getElementById("login").style.display="none";
  document.getElementById("chat").style.display="flex";
}

function addMsg(name,time,text){
  const div=document.createElement("div");
  div.className="msg";

  div.innerHTML=`
    <div class="name" onclick="openProfile('${name}')">${name}</div>
    <div class="time">${time}</div>
    <div>${text}</div>
  `;

  document.getElementById("messages").appendChild(div);
}

function addSys(msg){
  const div=document.createElement("div");
  div.className="msg";
  div.innerHTML="SYSTEM: "+msg;
  document.getElementById("messages").appendChild(div);
}

/* SEND */
document.getElementById("send").onclick=()=>{
  const t=document.getElementById("text").value;
  ws.send(JSON.stringify({type:"msg",text:t}));
  document.getElementById("text").value="";
};

/* PROFILE */
function openProfile(name){
  dmTo=name;
  const dm=document.getElementById("dm");
  dm.style.display="block";
  dm.innerHTML=`
    <h3>${name}</h3>
    <button onclick="startDM()">DM</button>
  `;
}

function startDM(){
  const msg=prompt("message:");
  ws.send(JSON.stringify({type:"dm",to:dmTo,text:msg}));
}

/* DM UI */
function openDM(from,text){
  const dm=document.getElementById("dm");
  dm.style.display="block";
  dm.innerHTML=`
    <b>DM from ${from}</b>
    <div>${text}</div>
    <button onclick="this.parentNode.style.display='none'">close</button>
  `;
}

/* toast */
function showToast(t){
  const div=document.createElement("div");
  div.className="toast";
  div.innerText=t;
  document.body.appendChild(div);
  setTimeout(()=>div.remove(),3000);
}
</script>

</body>
</html>
